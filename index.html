<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador QR</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
* {
    box-sizing: border-box;
}

body {
    font-family: Arial;
    background: #f4f4f4;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 500px;
    margin: auto;
    text-align: center;
}

input, select {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    margin-bottom: 10px;
}

.color-group {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
}

.color-group input {
    flex: 1;
    height: 45px;
    padding: 0;
}

.buttons {
    display: flex;
    gap: 10px;
    width: 100%;
    flex-wrap: wrap;
}

button {
    flex: 1;
    min-width: 120px;
    padding: 12px;
    font-size: 16px;
    cursor: pointer;
}

#qrcode {
    margin-top: 20px;
    display: flex;
    justify-content: center;
}

@media (max-width: 480px) {
    h2 {
        font-size: 20px;
    }

    button {
        font-size: 14px;
    }
}
</style>
</head>

<body>

<div class="container">
    <h2>Generador de Código QR</h2>

    <input type="text" id="texto" placeholder="Ingresá texto o URL">

    <div class="color-group">
        <input type="color" id="colorQR" value="#000000" title="Color QR">
        <input type="color" id="colorFondo" value="#ffffff" title="Color fondo">
    </div>

    <select id="formato">
        <option value="png">PNG</option>
        <option value="jpg">JPG</option>
    </select>

    <div class="buttons">
        <button onclick="generarQR()">Generar</button>
        <button onclick="limpiar()">Limpiar</button>
        <button onclick="descargar()">Exportar</button>
    </div>

    <div id="qrcode"></div>
</div>

<script>
function generarQR() {
    const texto = document.getElementById("texto").value;
    const colorQR = document.getElementById("colorQR").value;
    const colorFondo = document.getElementById("colorFondo").value;

    if (!texto) {
        alert("Ingresá un texto");
        return;
    }

    document.getElementById("qrcode").innerHTML = "";

    new QRCode(document.getElementById("qrcode"), {
        text: texto,
        width: 200,
        height: 200,
        colorDark: colorQR,
        colorLight: colorFondo
    });
}

function limpiar() {
    document.getElementById("texto").value = "";
    document.getElementById("qrcode").innerHTML = "";
}

function descargar() {
    const canvas = document.querySelector("#qrcode canvas");
    const img = document.querySelector("#qrcode img");
    const formato = document.getElementById("formato").value;

    if (!canvas && !img) {
        alert("Primero generá un QR");
        return;
    }

    let dataURL;

    if (canvas) {
        if (formato === "jpg") {
            const tempCanvas = document.createElement("canvas");
            const ctx = tempCanvas.getContext("2d");

            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;

            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
            ctx.drawImage(canvas, 0, 0);

            dataURL = tempCanvas.toDataURL("image/jpeg", 1.0);
        } else {
            dataURL = canvas.toDataURL("image/png");
        }
    } else {
        dataURL = img.src;
    }

    const link = document.createElement("a");
    link.href = dataURL;
    link.download = "codigoQR." + formato;
    link.click();
}
</script>

</body>
</html>
