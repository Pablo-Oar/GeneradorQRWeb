<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador QR</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
* { box-sizing: border-box; }

body {
    font-family: Arial;
    background: #f4f4f4;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 500px;
    margin: auto;
    text-align: center;
}

input, select {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    margin-bottom: 10px;
}

.color-group {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
}

.color-group input {
    flex: 1;
    height: 45px;
    padding: 0;
}

.buttons {
    display: flex;
    gap: 10px;
    width: 100%;
    flex-wrap: wrap;
}

button {
    flex: 1;
    min-width: 120px;
    padding: 12px;
    font-size: 16px;
    cursor: pointer;
}

#qrcode {
    margin-top: 20px;
    display: flex;
    justify-content: center;
}

canvas {
    max-width: 100%;
}

@media (max-width: 480px) {
    h2 { font-size: 20px; }
    button { font-size: 14px; }
}
</style>
</head>

<body>

<div class="container">
    <h2>Generador de Código QR</h2>

    <input type="text" id="texto" placeholder="Ingresá texto o URL">

    <div class="color-group">
        <input type="color" id="colorQR" value="#000000">
        <input type="color" id="colorFondo" value="#ffffff">
    </div>

    <select id="formato">
        <option value="png">PNG</option>
        <option value="jpg">JPG</option>
    </select>

    <input type="file" id="logoInput" accept="image/*">

    <div class="buttons">
        <button onclick="generarQR()">Generar</button>
        <button onclick="limpiar()">Limpiar</button>
        <button onclick="descargar()">Exportar</button>
    </div>

    <div id="qrcode">
        <canvas id="canvas"></canvas>
    </div>
</div>

<script>
let logoImg = null;

document.getElementById("logoInput").addEventListener("change", e => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = evt => {
        logoImg = new Image();
        logoImg.src = evt.target.result;
    };
    reader.readAsDataURL(file);
});

function generarQR() {
    const texto = document.getElementById("texto").value;
    const colorQR = document.getElementById("colorQR").value;
    const colorFondo = document.getElementById("colorFondo").value;
    const canvas = document.getElementById("canvas");

    if (!texto) {
        alert("Ingresá un texto");
        return;
    }

    QRCode.toCanvas(canvas, texto, {
        width: 200,
        color: {
            dark: colorQR,
            light: colorFondo
        },
        errorCorrectionLevel: "H"
    }, function (error) {
        if (error) return console.error(error);

        if (!logoImg) return;

        const ctx = canvas.getContext("2d");

        const drawLogo = () => {
            const size = canvas.width * 0.25;
            const x = (canvas.width - size) / 2;
            const y = (canvas.height - size) / 2;

            ctx.fillStyle = "#ffffff";
            ctx.fillRect(x, y, size, size);

            ctx.drawImage(logoImg, x, y, size, size);
        };

        if (logoImg.complete) {
            drawLogo();
        } else {
            logoImg.onload = drawLogo;
        }
    });
}

function limpiar() {
    document.getElementById("texto").value = "";
    const canvas = document.getElementById("canvas");
    canvas.getContext("2d").clearRect(0, 0, canvas.width, canvas.height);
    document.getElementById("logoInput").value = "";
    logoImg = null;
}

function descargar() {
    const canvas = document.getElementById("canvas");
    const formato = document.getElementById("formato").value;

    if (!canvas.width) {
        alert("Primero generá un QR");
        return;
    }

    let dataURL;

    if (formato === "jpg") {
        const temp = document.createElement("canvas");
        const ctx = temp.getContext("2d");

        temp.width = canvas.width;
        temp.height = canvas.height;

        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, temp.width, temp.height);
        ctx.drawImage(canvas, 0, 0);

        dataURL = temp.toDataURL("image/jpeg");
    } else {
        dataURL = canvas.toDataURL("image/png");
    }

    const link = document.createElement("a");
    link.href = dataURL;
    link.download = "codigoQR." + formato;
    link.click();
}
</script>

</body>
</html>
